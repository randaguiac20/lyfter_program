<!doctype html>
<html>
  <body>
    <form action="https://dummyjson.com/test" method="POST">
      <h1>Our elections for our new President!</h1>
      <p>Choose your candidate wisely.</p>

      <label for="first_name">First name</label>
      <br />
      <input type="text" id="first_name" name="first_name" />
      <br />
      <label for="last_name">Last name</label>
      <br />
      <input type="text" id="last_name" name="last_name" />
      <br />
      <label for="email">Email</label>
      <br />
      <input type="email" id="email" name="email" />
      <br />
      <label for="personalid">Personal ID</label>
      <br />
      <input type="text" id="personalid" name="personal_id" />
      <br />
      <label for="phone_number">Phone Number</label>
      <br />
      <input type="text" id="phone_number" name="phone_number" />
      <br />
      <br />
      <h2>Candidates for President</h2>
      <label for="type">Choose your candidate</label>
      <br />
      <br />
      <select name="type" id="type">
        <option hidden>Select one</option>
        <option value="candidate1">candidate1</option>
        <option value="candidate2">candidate2</option>
        <option value="candidate3">candidate3</option>
        <option value="candidate4">candidate4</option>
      </select>
      <br />
      <br />
      <button type="submit">Submit vote</button>
    </form>
  </body>
</html>
