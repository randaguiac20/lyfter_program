<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="tabla.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <div class="global-container">
        <h1>Billboard Hot 100™</h1>
        <hr class="title-line" />
        <span class="date">WEEK OF FEBRUARY 10, 2024</span>
      </div>
      <table>
        <thead>
          <tr>
            <th colspan="3" class="th-this-week">This week</th>
            <th class="th-metric">
              Award <span class="info-icon">&#9432;</span>
            </th>
            <th class="th-metric">Last<br />week</th>
            <th class="th-metric">Peak<br />pos.</th>
            <th class="th-metric">WKS on<br />chart</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="td-rank">1</td>
            <td class="td-art">
              <div class="album-art"></div>
            </td>
            <td class="td-info">
              <span class="badge-new">NEW</span>
              <div class="song-title">Hiss</div>
              <div class="song-artist">Megan Thee Stallion</div>
            </td>
            <td class="td-metric"><span class="award-icon">&#9733;</span></td>
            <td class="td-metric">-</td>
            <td class="td-metric bold">1</td>
            <td class="td-metric bold">1</td>
          </tr>
          <tr>
            <td class="td-rank">2</td>
            <td class="td-art"><div class="album-art album-art--2"></div></td>
            <td class="td-info">
              <span class="badge-arrow badge-arrow--down">&#8595;</span>
              <div class="song-title">Lovin On Me</div>
              <div class="song-artist">Jack Harlow</div>
            </td>
            <td class="td-metric"></td>
            <td class="td-metric bold">1</td>
            <td class="td-metric bold">1</td>
            <td class="td-metric bold">12</td>
          </tr>
          <tr>
            <td class="td-rank">3</td>
            <td class="td-art"><div class="album-art album-art--3"></div></td>
            <td class="td-info">
              <span class="badge-arrow badge-arrow--down">&#8595;</span>
              <div class="song-title">Cruel Summer</div>
              <div class="song-artist">Taylor Swift</div>
            </td>
            <td class="td-metric"></td>
            <td class="td-metric bold">2</td>
            <td class="td-metric bold">1</td>
            <td class="td-metric bold">39</td>
          </tr>
          <tr>
            <td class="td-rank">4</td>
            <td class="td-art"><div class="album-art album-art--4"></div></td>
            <td class="td-info">
              <span class="badge-arrow badge-arrow--neutral">&#8594;</span>
              <div class="song-title">Lose Control</div>
              <div class="song-artist">Teddy Swims</div>
            </td>
            <td class="td-metric"><span class="award-icon">&#9733;</span></td>
            <td class="td-metric bold">4</td>
            <td class="td-metric bold">4</td>
            <td class="td-metric bold">25</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
