<!--
Cree dos archivos de texto con el siguiente contenido.
Lea ambos archivos y compare cuales palabras se repiten en ambos.
Muestre el mensaje escondido al final del programa.
-->

<!doctype html>
<html>
  <head>
    <title>Ejercicio2</title>
  </head>
  <body>
    <br />
    <label>File 1: <input type="file" id="file1" /></label>
    <br /><br />
    <label>File 2: <input type="file" id="file2" /></label>
    <br /><br />
    <button id="compare-button">Compare</button>
    <p id="common-words"></p>
    <p id="hidden-message"></p>
  </body>
  <script>
    const button = document.getElementById("compare-button");
    const commonWords = document.getElementById("common-words");
    const hiddenMessage = document.getElementById("hidden-message");

    function readFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsText(file);
      });
    }

    button.addEventListener("click", async () => {
      const file1 = document.getElementById("file1").files[0];
      const file2 = document.getElementById("file2").files[0];

      // Make sure both files are loaded
      if (!file1 || !file2) {
        commonWords.textContent = "Please select both files.";
        return;
      }

      const content1 = await readFile(file1);
      const content2 = await readFile(file2);

      const words1 = content1.split("\n");
      const words2 = content2.split("\n");

      const common = words1.filter((word) => words2.includes(word));

      commonWords.textContent = "Common words: " + common.join(", ");
      hiddenMessage.textContent = "Hidden message: " + common.join(" ");
    });
  </script>
</html>
