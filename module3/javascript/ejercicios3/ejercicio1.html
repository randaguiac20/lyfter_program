<!--
Cree una función que reciba tres parámetros: un número y dos funciones de callback.
Si el número es par, se debe ejecutar el primer callback.
Este debe mostrar “The number is even!”.
Si el número es impar, se debe ejecutar el segundo.
Este debe mostrar “The number is odd!”.
-->

<!doctype html>
<html>
  <head>
    <title>Ejercicio1</title>
  </head>
  <body>
    <input type="text" id="number" name="number" />
    <button id="show-button">Enter number</button>
    <p id="display"></p>
  </body>
  <script>
    const button = document.getElementById("show-button");
    const display = document.getElementById("display");
    const input = document.getElementById("number");

    function isEven() {
      display.textContent = "The number is even!";
    }
    function isOdd() {
      display.textContent = "The number is odd!";
    }

    function checkNumber(num, evenCallback, oddCallback) {
      if (num % 2 === 0) {
        evenCallback();
      } else {
        oddCallback();
      }
    }

    button.addEventListener("click", () => {
      // convert string → number
      const num = Number(input.value);
      if (isNaN(num)) {
        display.textContent = "This is not a number!";
        input.value = "";
        return;
      }
      checkNumber(num, isEven, isOdd);
      input.value = "";
    });
  </script>
</html>
