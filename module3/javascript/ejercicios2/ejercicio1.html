<!-- Crea un documento HTML con un botón que agregue elementos a una lista
ordenada, y otro que limpie todos los elementos de la lista. Realizalo agregando
el código JS dentro de un elemento script. -->

<!doctype html>
<html>
  <head>
    <title>Ejercicio1</title>
  </head>
  <body>
    <div>
      <button id="add-button">Add list</button>
      <button id="delete-button">Delete list</button>
      <ol id="list-element"></ol>
    </div>
  </body>

  <script>
    const addButton = document.getElementById("add-button");
    const deleteButton = document.getElementById("delete-button");

    const addItem = () => {
      const item = document.createElement("li");
      item.innerHTML = "New item";
      const list = document.getElementById("list-element");
      list.appendChild(item);
    };

    const deleteItem = () => {
      const list = document.getElementById("list-element");
      list.innerHTML = "";
    };

    addButton.addEventListener("click", addItem);
    deleteButton.addEventListener("click", deleteItem);
  </script>
</html>
