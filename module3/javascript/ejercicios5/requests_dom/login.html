<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Lyfter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="register.html" class="navbar-brand">Lyfter</a>
      <div class="navbar-links">
        <a href="register.html">Register</a>
        <a href="login.html" class="active">Login</a>
      </div>
    </nav>

    <div class="page">
      <div class="card">
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">
          Enter your User ID and password to continue.
        </p>

        <!-- Global alert (success / error) -->
        <div id="alert" class="alert hidden" role="alert"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="userId">User ID</label>
            <input
              type="text"
              id="userId"
              placeholder="USR-XXXXXXXX-XXXXX"
              autocomplete="username"
            />
            <span class="field-error" id="userId-error"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Your password"
              autocomplete="current-password"
            />
            <span class="field-error" id="password-error"></span>
          </div>

          <div class="checkbox-group">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe">Remember my User ID on this device</label>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            Log In
          </button>
        </form>

        <div class="divider"><span>or</span></div>

        <a href="register.html" class="btn btn-secondary">Create an account</a>

        <p class="text-center mt-16">
          Forgot your password?
          <a href="change-password.html" class="link">Reset it here</a>
        </p>
      </div>
    </div>

    <script src="db.js"></script>
    <script src="session.js"></script>
    <script src="login.js"></script>
  </body>
</html>
