<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password — Lyfter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="profile.html" class="navbar-brand">Lyfter</a>
      <!-- Populated dynamically by change-password.js based on session state -->
      <div class="navbar-links" id="navLinks"></div>
    </nav>

    <div class="page">
      <div class="card">
        <h1 class="card-title">Change Password</h1>
        <p class="card-subtitle">Enter your User ID and set a new password.</p>

        <!-- Global alert (success / error) -->
        <div id="alert" class="alert hidden" role="alert"></div>

        <form id="changePasswordForm" novalidate>
          <div class="form-group">
            <label for="userId">User ID</label>
            <input
              type="text"
              id="userId"
              placeholder="USR-XXXXXXXX-XXXXX"
              autocomplete="username"
            />
            <span class="field-error" id="userId-error"></span>
          </div>

          <div class="form-group">
            <label for="oldPassword">Current Password</label>
            <input
              type="password"
              id="oldPassword"
              placeholder="Your current password"
              autocomplete="current-password"
            />
            <span class="field-error" id="oldPassword-error"></span>
          </div>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input
              type="password"
              id="newPassword"
              placeholder="Min. 6 characters"
              autocomplete="new-password"
            />
            <span class="field-error" id="newPassword-error"></span>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input
              type="password"
              id="confirmPassword"
              placeholder="Repeat new password"
              autocomplete="new-password"
            />
            <span class="field-error" id="confirmPassword-error"></span>
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">
            Update Password
          </button>
        </form>

        <p class="text-center mt-16">
          <a href="login.html" class="link">← Back to Login</a>
        </p>
      </div>
    </div>

    <script src="db.js"></script>
    <script src="session.js"></script>
    <script src="change-password.js"></script>
  </body>
</html>
